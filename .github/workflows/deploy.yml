name: S3 Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    environment: main-deployment
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      VITE_APP_COGNITO_DOMAIN: ${{ secrets.VITE_APP_COGNITO_DOMAIN }}
      VITE_APP_COGNITO_LOGOUT_URI: ${{ secrets.VITE_APP_COGNITO_LOGOUT_URI }}
      VITE_APP_COGNITO_AUTHORITY: ${{ secrets.VITE_APP_COGNITO_AUTHORITY }}
      VITE_APP_COGNITO_CLIENT_ID: ${{ secrets.VITE_APP_COGNITO_CLIENT_ID }}
      VITE_APP_COGNITO_REDIRECT_URI: ${{ secrets.VITE_APP_COGNITO_REDIRECT_URI }}
      VITE_APP_COGNITO_RESPONSE_TYPE: ${{ secrets.VITE_APP_COGNITO_RESPONSE_TYPE }}
      VITE_APP_COGNITO_SCOPE: ${{ secrets.VITE_APP_COGNITO_SCOPE }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ secrets.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      # Content-hashed assets (dist/assets/**) never change for a given URL,
      # so they can be cached forever. Uploaded first so they exist before
      # index.html (which references them) goes live.
      - name: Upload hashed assets (immutable, 1 year)
        run: |
          aws s3 sync dist/assets "s3://${{ secrets.S3_BUCKET }}/assets" \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      # Everything else (index.html, locales/*.json, favicons, etc.) is served
      # from a stable URL, so it must always be revalidated to pick up new builds.
      - name: Upload remaining files (always revalidate)
        run: |
          aws s3 sync dist "s3://${{ secrets.S3_BUCKET }}" \
            --delete \
            --exclude "assets/*" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
