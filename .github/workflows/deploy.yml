name: S3 Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    environment: main-deployment
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      VITE_APP_COGNITO_DOMAIN: ${{ secrets.VITE_APP_COGNITO_DOMAIN }}
      VITE_APP_COGNITO_LOGOUT_URI: ${{ secrets.VITE_APP_COGNITO_LOGOUT_URI }}
      VITE_APP_COGNITO_AUTHORITY: ${{ secrets.VITE_APP_COGNITO_AUTHORITY }}
      VITE_APP_COGNITO_CLIENT_ID: ${{ secrets.VITE_APP_COGNITO_CLIENT_ID }}
      VITE_APP_COGNITO_REDIRECT_URI: ${{ secrets.VITE_APP_COGNITO_REDIRECT_URI }}
      VITE_APP_COGNITO_RESPONSE_TYPE: ${{ secrets.VITE_APP_COGNITO_RESPONSE_TYPE }}
      VITE_APP_COGNITO_SCOPE: ${{ secrets.VITE_APP_COGNITO_SCOPE }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ secrets.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      # Content-hashed assets (dist/assets/**) never change for a given URL,
      # so browsers and CloudFront can cache them forever. Uploaded first so
      # they exist before index.html (which references them) goes live.
      - name: Upload hashed assets (immutable, 1 year)
        run: |
          aws s3 sync dist/assets "s3://${{ secrets.S3_BUCKET }}/assets" \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      # index.html and the (non-hashed) locale JSON must always reflect the
      # latest deploy, so the browser revalidates every load (max-age=0). But
      # s-maxage lets CloudFront serve them from the edge instead of hitting the
      # S3 origin on every request; the `/*` invalidation below busts that edge
      # cache on each deploy, so freshness is guaranteed.
      - name: Upload HTML + locales (edge-cached, browser revalidates)
        run: |
          aws s3 sync dist "s3://${{ secrets.S3_BUCKET }}" \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "public, max-age=0, s-maxage=31536000, must-revalidate"

      # Favicons, manifest and other static public files change rarely, so give
      # them a real browser cache (1 day) to stop the per-page-load round-trips,
      # plus long edge caching. Deploys still bust the edge via invalidation.
      - name: Upload static public files (cached)
        run: |
          aws s3 sync dist "s3://${{ secrets.S3_BUCKET }}" \
            --delete \
            --exclude "assets/*" \
            --exclude "*.html" \
            --exclude "*.json" \
            --cache-control "public, max-age=86400, s-maxage=31536000"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
